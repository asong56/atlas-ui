name: Deploy → release

on:
  push:
    branches: [main]
    paths:
      - 'src/scss/**'
      - 'assets/**'
      - 'templates/**'
      - 'package.json'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - run: bun install
      - run: bun run build

      - name: Assemble dist
        run: |
          mkdir -p dist/static/css
          cp -r static/css/. dist/static/css/
          cp -r assets        dist/
          cp -r templates     dist/
          cp README.md        dist/

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: release
          folder: dist
          clean: true
          single-commit: false
